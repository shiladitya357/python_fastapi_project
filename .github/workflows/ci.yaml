name: FastAPI CI Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: "shiladitya997/python_fastapi_project"

jobs:
  test-build-scan-push:
    name: Test, Build, Scan, and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      
      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      
      - name: Run Tests
        run: |
          mkdir -p test-results
          pytest --junitxml=test-results/results.xml
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: warn
      
      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest . 
      
      ## Commenting this out as this is demo project.
      # - name: Scan Docker Image with Trivy
      #   uses: aquasecurity/trivy-action@v0.35.0
      #   with:
      #     image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
      #     format: 'table'
      #     exit-code: '1'
      #     ignore-unfixed: true
      #     vuln-type: 'os,library'
      #     severity: 'CRITICAL,HIGH'
      
      - name: Log in to DockerHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Push Docker Image to DockerHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
      
      - name: Log out from DockerHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker logout
      
      - name: Notify on Failure
        if: failure()
        run: |
            echo "The CI pipeline for commit ${GITHUB_SHA} has failed. Please check the workflow logs for details."

      - name: Publish Summary
        if: always()
        run: |
            echo "## CI Pipeline Summary"
            echo "**Commit:** ${GITHUB_SHA}"
            echo "**Branch:** ${GITHUB_REF}"
            echo "**Workflow Status:** ${GITHUB_WORKFLOW}"
            echo "**Run Number:** ${GITHUB_RUN_NUMBER}"
            echo "**Run ID:** ${GITHUB_RUN_ID}"
            echo "**Image Name (Tagged):** ${IMAGE_NAME}:${GITHUB_SHA}"
            echo "**Image Name (Latest):** ${IMAGE_NAME}:latest"